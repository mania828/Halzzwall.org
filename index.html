  :root{
    --ink:#f0eaff;
    --dim:#9d8fc9;
    --cyan:#c9a2ff;
    --violet:#a78bfa;
    --magenta:#ff6ad5;
    --bg:#0a0418;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:auto;background:var(--bg);-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Sora',sans-serif;
    overflow-x:hidden;
    cursor:none;
    -webkit-tap-highlight-color:transparent;
  }
  @media (pointer:coarse){ body{cursor:auto} #cursor{display:none} }

  /* ---------- custom cursor ---------- */
  #cursor{
    position:fixed;z-index:60;top:0;left:0;width:14px;height:14px;
    border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,rgba(201,162,255,.9),rgba(201,162,255,0) 70%);
    box-shadow:0 0 18px 4px rgba(180,140,255,.35);
    transform:translate(-50%,-50%);
    transition:width .25s,height .25s;
    mix-blend-mode:screen;
  }
  body:has(a:hover) #cursor{width:34px;height:34px}

  /* ---------- loader ---------- */
  #loader{
    position:fixed;inset:0;z-index:100;
    background-color:#0a0418;
    background-image:radial-gradient(ellipse at 50% 60%,#120829 0%,#0a0418 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:34px;transition:opacity 1.1s ease,visibility 1.1s;
  }
  #loader.done{opacity:0;visibility:hidden;pointer-events:none}
  #loaderPlanet{width:min(38vmin,220px);height:min(38vmin,220px);border-radius:50%;position:relative;
    background:radial-gradient(circle at 35% 30%,#c084fc,#7c3aed 45%,#3b1a78 78%,#160a2e 100%);
    box-shadow:0 0 60px 10px rgba(160,110,255,.45),inset -14px -14px 40px rgba(0,0,0,.55);
    animation:planetPulse 2.4s ease-in-out infinite;
  }
  #loaderPlanet::after{
    content:'';position:absolute;inset:-14px;border-radius:50%;
    border:1px solid rgba(196,162,255,.35);
    animation:ringSpin 6s linear infinite;
  }
  @keyframes planetPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes ringSpin{to{transform:rotate(360deg)}}
  #loader .word{
    font-family:'Fraunces',serif;font-style:italic;
    font-size:clamp(17px,2.4vw,23px);letter-spacing:.35em;color:var(--dim);
    animation:spiderPulse 2.4s ease-in-out infinite;
  }
  @keyframes spiderPulse{0%,100%{opacity:1}50%{opacity:.55}}
  #loader .pct{
    font-size:12px;letter-spacing:.5em;color:rgba(190,150,255,.8);
    font-weight:300;
  }

  /* ---------- scroll scaffold ---------- */
  #stage{position:fixed;inset:0;z-index:1}
  #stage canvas{display:block}

  #vignette{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 52%,rgba(2,1,10,.55) 100%);
  }

  /* ---------- overlay sections ---------- */
  .panel{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 6vw;
    opacity:1;pointer-events:auto;
  }
  h1{
    font-family:'October Crow','Sora',sans-serif;font-weight:400;
    font-size:clamp(52px,11.5vw,168px);line-height:.95;letter-spacing:.01em;
    background:linear-gradient(160deg,#f6f0ff 20%,#cfaaff 55%,#8b5cf6 95%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 34px rgba(160,110,255,.3));
  }
  h2{
    font-family:'October Crow','Sora',sans-serif;font-weight:400;
    font-size:clamp(34px,6vw,84px);line-height:1.02;
    background:linear-gradient(160deg,#f6f0ff 30%,#bda2ff 85%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .serif{
    font-family:'Fraunces',serif;font-style:italic;font-weight:400;
    font-size:clamp(18px,2.6vw,30px);color:#cabce8;
    margin-top:26px;max-width:640px;line-height:1.5;
    text-shadow:0 2px 22px rgba(2,1,10,.95),0 0 8px rgba(2,1,10,.8);
  }
  h1,h2{text-shadow:none}

  .cheatsTag{
    margin-top:14px;
    font-family:'October Crow','Sora',sans-serif;font-weight:400;
    font-size:clamp(28px,5vw,56px);letter-spacing:.08em;text-transform:uppercase;
    color:var(--cyan);
    text-shadow:0 0 20px rgba(180,140,255,.65);
  }

  /* ---------- link cards ---------- */
  #links{
    display:flex;gap:clamp(14px,2.4vw,30px);margin-top:52px;flex-wrap:wrap;justify-content:center;
  }
  .card{
    --glow:var(--cyan);
    position:relative;width:min(240px,80vw);padding:26px 26px 24px;
    border-radius:18px;text-decoration:none;color:var(--ink);
    background:linear-gradient(165deg,rgba(20,16,52,.55),rgba(8,5,26,.65));
    border:1px solid rgba(140,180,255,.16);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    display:flex;flex-direction:column;align-items:flex-start;gap:14px;
    transition:transform .45s cubic-bezier(.2,1.4,.3,1),border-color .35s,box-shadow .35s;
    overflow:hidden;
  }
  .card::after{
    content:'';position:absolute;inset:0;border-radius:18px;
    background:radial-gradient(120% 90% at 50% -10%,color-mix(in srgb,var(--glow) 22%,transparent),transparent 60%);
    opacity:0;transition:opacity .4s;
  }
  .card:hover{transform:translateY(-8px) scale(1.015);border-color:color-mix(in srgb,var(--glow) 55%,transparent);
    box-shadow:0 18px 50px -12px color-mix(in srgb,var(--glow) 35%,transparent),0 0 0 1px color-mix(in srgb,var(--glow) 25%,transparent) inset}
  .card:hover::after{opacity:1}
  .card svg{width:30px;height:30px;fill:var(--glow);filter:drop-shadow(0 0 8px color-mix(in srgb,var(--glow) 70%,transparent))}
  .card .name{font-family:'October Crow','Sora',sans-serif;font-weight:400;font-size:23px;letter-spacing:.03em}
  .card .handle{font-size:13px;color:var(--dim);letter-spacing:.06em}
  .card .go{
    margin-top:6px;font-size:10px;letter-spacing:.4em;text-transform:uppercase;
    color:var(--glow);display:flex;align-items:center;gap:8px;
  }
  .card .go::after{content:'→';transition:transform .3s}
  .card:hover .go::after{transform:translateX(6px)}
  .card.tg{--glow:#3ec6ff}
  .card.tt{--glow:#ff3860}
  .card.ig{--glow:#d62976}

  #fin{
    margin-top:60px;font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:rgba(143,168,201,.55);
  }

  .hintPill{
    margin-top:34px;display:inline-flex;align-items:center;gap:12px;
    padding:12px 26px;border-radius:100px;
    border:1px solid rgba(180,140,255,.25);background:rgba(16,8,36,.45);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--cyan);
  }
  .hintPill .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 12px 3px rgba(180,140,255,.7);animation:spiderPulse 1.6s ease-in-out infinite}

  /* ---------- hero quick links ---------- */
  #heroLinks{display:flex;gap:clamp(10px,1.6vw,16px);margin-top:44px;flex-wrap:wrap;justify-content:center}
  .plink{
    --glow:#3ec6ff;
    display:inline-flex;align-items:center;gap:11px;padding:14px 26px;border-radius:100px;
    text-decoration:none;color:var(--ink);font-size:14px;letter-spacing:.08em;font-weight:500;
    background:rgba(22,10,46,.5);border:1px solid rgba(190,150,255,.2);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    transition:transform .35s cubic-bezier(.2,1.4,.3,1),border-color .3s,box-shadow .3s;
  }
  .plink svg{width:19px;height:19px;fill:var(--glow);filter:drop-shadow(0 0 6px color-mix(in srgb,var(--glow) 70%,transparent))}
  .plink:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--glow) 60%,transparent);
    box-shadow:0 10px 34px -8px color-mix(in srgb,var(--glow) 45%,transparent)}
  .plink.tg{--glow:#3ec6ff}.plink.tt{--glow:#ff3860}.plink.ig{--glow:#d62976}

  /* ---------- persistent dock ---------- */
  #dock{
    position:fixed;top:22px;right:22px;z-index:40;display:flex;gap:11px;
    opacity:0;pointer-events:none;transform:translateY(-8px);
    transition:opacity .5s,transform .5s;
  }

  @media (max-width:760px){#dock{top:auto;bottom:calc(14px + env(safe-area-inset-bottom));right:50%;transform:translate(50%,8px)}#dock.on{transform:translate(50%,0)}}

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ================= setup ================= */
const stage = document.getElementById('stage');
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const touchDevice = matchMedia('(pointer:coarse)').matches;
const isMobile = touchDevice || innerWidth < 720;
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
} catch (e) {
  document.getElementById('fallback').style.display = 'flex';
  document.getElementById('loader').classList.add('done');
  throw e;
}
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.75 : 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0418);
scene.fog = new THREE.FogExp2(0x0d0524, 0.012);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 400);

function frameForViewport() {
  const a = innerWidth / innerHeight;
  camera.aspect = a;
  camera.fov = a < 0.75 ? 60 : 50;
  camera.updateProjectionMatrix();
}
frameForViewport();

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.65, 0.6, 0.35);
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ================= lights ================= */
scene.add(new THREE.HemisphereLight(0x4a3388, 0x040112, 0.6));
const key = new THREE.PointLight(0xc084fc, 55, 60, 1.7); key.position.set(18, 10, 14); scene.add(key);
const rim = new THREE.PointLight(0x7c3aed, 40, 60, 1.7); rim.position.set(-14, -6, 10); scene.add(rim);

/* ================= starfield ================= */
{
  const N = 1400;
  const pos = new Float32Array(N * 3), phase = new Float32Array(N), sz = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(60 + Math.random() * 120);
    pos.set([v.x, v.y, v.z], i * 3);
    phase[i] = Math.random() * Math.PI * 2;
    sz[i] = 0.5 + Math.random() * 1.6;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('phase', new THREE.BufferAttribute(phase, 1));
  g.setAttribute('sz', new THREE.BufferAttribute(sz, 1));
  const m = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    uniforms: { uT: { value: 0 } },
    vertexShader: `
      attribute float phase; attribute float sz; uniform float uT; varying float vA;
      void main(){
        vA = .35 + .65 * (0.5 + 0.5 * sin(uT * 1.2 + phase));
        vec4 mv = modelViewMatrix * vec4(position,1.);
        gl_PointSize = sz * 2.2 * (200. / -mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying float vA;
      void main(){
        float d = length(gl_PointCoord - .5);
        float a = smoothstep(.5, .05, d) * vA;
        gl_FragColor = vec4(.85, .78, 1., a);
      }`
  });
  const stars = new THREE.Points(g, m);
  scene.add(stars);
  scene.userData.starMat = m;
  scene.userData.starMesh = stars;
}

/* ================= THE PLANET ================= */
const world = new THREE.Group();
scene.add(world);

const PLANET_R = 4.2;
const planetMat = new THREE.ShaderMaterial({
  uniforms: {
    uT: { value: 0 },
    uColA: { value: new THREE.Color(0x1a0b33) },
    uColB: { value: new THREE.Color(0x8b5cf6) },
    uColC: { value: new THREE.Color(0xe9d5ff) },
    uPulse: { value: new THREE.Vector3(999, 999, 999) },
    uPulseT: { value: 0 }
  },
  vertexShader: `
    varying vec3 vN; varying vec3 vP; varying vec2 vUv;
    void main(){
      vN = normalize(normalMatrix * normal);
      vP = position;
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.);
    }`,
  fragmentShader: `
    uniform float uT; uniform vec3 uColA, uColB, uColC;
    uniform vec3 uPulse; uniform float uPulseT;
    varying vec3 vN; varying vec3 vP; varying vec2 vUv;

    float hash(vec3 p){ return fract(sin(dot(p, vec3(12.9898,78.233,45.164))) * 43758.5453); }
    float noise(vec3 p){
      vec3 i = floor(p); vec3 f = fract(p);
      f = f*f*(3.0-2.0*f);
      float n = mix(
        mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)), f.x),
            mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
        mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x),
            mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y), f.z);
      return n;
    }
    float fbm(vec3 p){
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 4; i++){
        v += a * noise(p);
        p *= 2.0;
        a *= 0.5;
      }
      return v;
    }

    void main(){
      vec3 p = normalize(vP);

      /* Saturn-style horizontal bands from latitude, with gentle turbulent flow */
      float lat = p.y * 3.4 + fbm(p * 2.2 + vec3(uT*0.01, 0., 0.)) * 0.6;
      float band = sin(lat * 3.14159) * 0.5 + 0.5;
      float flow = fbm(p * 4.0 + vec3(uT*0.02, uT*0.008, 0.));
      float mixv = clamp(band * 0.75 + flow * 0.35, 0.0, 1.0);

      vec3 base = mix(uColA, uColB, mixv);
      base = mix(base, uColC, smoothstep(0.82, 1.0, band) * 0.35);

      vec3 L = normalize(vec3(0.6,0.5,0.8));
      float light = clamp(dot(vN, L), 0.0, 1.0);
      vec3 col = base * (0.38 + light * 0.85);

      vec3 V = normalize(cameraPosition - vP);
      vec3 H = normalize(L + V);
      float spec = pow(clamp(dot(vN, H), 0.0, 1.0), 40.0);
      col += vec3(0.9, 0.82, 1.0) * spec * 0.22;

      float d = length(vP - uPulse);
      float ring = smoothstep(uPulseT - 0.35, uPulseT, d) * (1.0 - smoothstep(uPulseT, uPulseT + 0.35, d));
      col += vec3(0.85, 0.7, 1.0) * ring * 1.4;

      gl_FragColor = vec4(col, 1.0);
    }`
});
const planet = new THREE.Mesh(new THREE.IcosahedronGeometry(PLANET_R, 6), planetMat);
world.add(planet);

/* thin limb atmosphere (subtle, not an all-over halo) */
const atmoMat = new THREE.ShaderMaterial({
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide,
  uniforms: { uColor: { value: new THREE.Color(0xb98cff) } },
  vertexShader: `
    varying vec3 vN;
    void main(){
      vN = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.);
    }`,
  fragmentShader: `
    uniform vec3 uColor; varying vec3 vN;
    void main(){
      float rim = pow(1.0 - max(dot(vN, vec3(0.,0.,1.)), 0.0), 4.5);
      gl_FragColor = vec4(uColor, rim * 0.55);
    }`
});
const atmosphere = new THREE.Mesh(new THREE.IcosahedronGeometry(PLANET_R * 1.035, 24), atmoMat);
world.add(atmosphere);

/* Saturn-style flat ring disk */
{
  const inner = PLANET_R * 1.55;
  const outer = PLANET_R * 2.9;
  const ringGeo = new THREE.RingGeometry(inner, outer, 128, 1);
  const posAttr = ringGeo.attributes.position;
  const uvAttr = ringGeo.attributes.uv;
  for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i), y = posAttr.getY(i);
    const r = Math.sqrt(x * x + y * y);
    const t = (r - inner) / (outer - inner);
    uvAttr.setXY(i, t, 0.5);
  }
  const ringMat = new THREE.ShaderMaterial({
    transparent: true, side: THREE.DoubleSide, depthWrite: false,
    blending: THREE.NormalBlending,
    uniforms: { uT: { value: 0 } },
    vertexShader: `
      varying vec2 vUv;
      void main(){
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.);
      }`,
    fragmentShader: `
      uniform float uT; varying vec2 vUv;
      float hash(float n){ return fract(sin(n) * 43758.5453); }
      void main(){
        float t = vUv.x;
        float band = sin(t * 46.0) * 0.5 + 0.5;
        band = mix(band, hash(floor(t * 90.0)), 0.3);
        vec3 dark = vec3(0.22, 0.12, 0.42);
        vec3 light = vec3(0.78, 0.62, 1.0);
        vec3 col = mix(dark, light, band);
        float edge = smoothstep(0.0, 0.08, t) * (1.0 - smoothstep(0.92, 1.0, t));
        float alpha = (0.35 + band * 0.4) * edge;
        gl_FragColor = vec4(col, alpha);
      }`
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2 - 0.42;
  world.add(ring);
  world.userData.ringMat = ringMat;
}

/* ================= background planets ================= */
const bgPlanetDefs = [
  { color: 0x5b21b6, glow: 0x8b5cf6, r: 1.1, pos: [-22, 6, -30], spin: 0.05 },
  { color: 0x9333ea, glow: 0xc084fc, r: 0.7, pos: [26, -8, -24], spin: -0.08 },
  { color: 0x312e81, glow: 0x818cf8, r: 1.6, pos: [10, 16, -46], spin: 0.03 },
  { color: 0xbe185d, glow: 0xf472b6, r: 0.5, pos: [-30, -14, -18], spin: -0.11 }
];
const bgPlanets = bgPlanetDefs.map(def => {
  const group = new THREE.Group();
  group.position.set(def.pos[0], def.pos[1], def.pos[2]);
  scene.add(group);

  const mat = new THREE.MeshPhysicalMaterial({
    color: def.color, emissive: def.color, emissiveIntensity: 0.25,
    roughness: 0.55, metalness: 0.15, clearcoat: 0.25
  });
  const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(def.r, 3), mat);
  group.add(mesh);

  const glowMat = new THREE.ShaderMaterial({
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.BackSide,
    uniforms: { uColor: { value: new THREE.Color(def.glow) } },
    vertexShader: `varying vec3 vN; void main(){ vN = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.); }`,
    fragmentShader: `uniform vec3 uColor; varying vec3 vN; void main(){ float rim = pow(1.0 - max(dot(vN, vec3(0.,0.,1.)), 0.0), 2.4); gl_FragColor = vec4(uColor, rim * 0.8); }`
  });
  const glow = new THREE.Mesh(new THREE.IcosahedronGeometry(def.r * 1.22, 3), glowMat);
  group.add(glow);

  return { group, mesh, spin: def.spin };
});

/* ================= moons ================= */
const moonDefs = [
  { key: 'tg', color: 0x3ec6ff, radius: PLANET_R * 2.4, speed: 0.16, tilt: 0.12, size: 0.34 },
  { key: 'tt', color: 0xff3860, radius: PLANET_R * 3.0, speed: -0.11, tilt: -0.22, size: 0.4 },
  { key: 'ig', color: 0xd62976, radius: PLANET_R * 3.7, speed: 0.08, tilt: 0.3, size: 0.3 }
];
const moons = moonDefs.map(def => {
  const mat = new THREE.MeshPhysicalMaterial({
    color: def.color, emissive: def.color, emissiveIntensity: 0.5,
    roughness: 0.4, metalness: 0.2, clearcoat: 0.4
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(def.size, 24, 20), mat);
  const orbitGroup = new THREE.Group();
  orbitGroup.rotation.x = def.tilt;
  orbitGroup.add(mesh);
  world.add(orbitGroup);

  const orbitPts = [];
  for (let i = 0; i <= 64; i++) {
    const a = (i / 64) * Math.PI * 2;
    orbitPts.push(new THREE.Vector3(Math.cos(a) * def.radius, 0, Math.sin(a) * def.radius));
  }
  const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPts);
  const orbitLine = new THREE.LineLoop(orbitGeo, new THREE.LineBasicMaterial({
    color: def.color, transparent: true, opacity: 0.22, blending: THREE.AdditiveBlending, depthWrite: false
  }));
  orbitGroup.add(orbitLine);

  const glow = new THREE.PointLight(def.color, 3, 6, 2);
  mesh.add(glow);

  return { def, mesh, orbitGroup, angle: Math.random() * Math.PI * 2, el: document.getElementById('moon-' + def.key) };
});

/* ================= camera orbit control (drag) ================= */
let camDist = 22, camTheta = 0.35, camPhi = 1.25;
let targetDist = camDist, targetTheta = camTheta, targetPhi = camPhi;
let dragging = false, lastX = 0, lastY = 0;
const cursorEl = document.getElementById('cursor');

function clampPhi(p){ return Math.max(0.35, Math.min(Math.PI - 0.35, p)); }

addEventListener('pointerdown', e => {
  if (e.target.closest('a')) return;
  dragging = true; lastX = e.clientX; lastY = e.clientY;
});
addEventListener('pointerup', () => dragging = false);
addEventListener('pointercancel', () => dragging = false);

addEventListener('pointermove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
  if (dragging) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    targetTheta -= dx * 0.0045;
    targetPhi = clampPhi(targetPhi - dy * 0.0045);
  }
});

addEventListener('pointerdown', e => {
  if (e.target.closest('a')) return;
  const w = pointerToPlanet(e.clientX, e.clientY);
  if (w) pulsePlanet(w);
});

const raycaster = new THREE.Raycaster();
const pointerNDC = new THREE.Vector2();
function pointerToPlanet(clientX, clientY) {
  pointerNDC.set((clientX / innerWidth) * 2 - 1, -(clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(pointerNDC, camera);
  const hits = raycaster.intersectObject(planet);
  if (hits.length) return planet.worldToLocal(hits[0].point.clone());
  return null;
}

function pulsePlanet(localPoint) {
  planetMat.uniforms.uPulse.value.copy(localPoint);
  planetMat.uniforms.uPulseT.value = 0;
  pulseActive = true;
  pulseStart = performance.now();
}
let pulseActive = false, pulseStart = 0;

/* ================= idle auto-rotate (no scroll on this page) ================= */
let idleTimer = 0;

/* ================= resize ================= */
addEventListener('resize', () => {
  frameForViewport();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

/* ================= main loop ================= */
const clock = new THREE.Clock();
const dockEl = document.getElementById('dock');
dockEl.classList.add('on');
let firstFrame = true;
const tmpScreen = new THREE.Vector3();

function updateMoonLabel(m) {
  const worldPos = new THREE.Vector3();
  m.mesh.getWorldPosition(worldPos);
  tmpScreen.copy(worldPos).project(camera);
  const behind = tmpScreen.z > 1;
  const x = (tmpScreen.x * 0.5 + 0.5) * innerWidth;
  const y = (-tmpScreen.y * 0.5 + 0.5) * innerHeight;
  if (behind || x < -80 || x > innerWidth + 80 || y < -40 || y > innerHeight + 40) {
    m.el.style.opacity = '0';
    m.el.style.pointerEvents = 'none';
  } else {
    m.el.style.opacity = '1';
    m.el.style.pointerEvents = 'auto';
    m.el.style.transform = 'translate(' + x + 'px,' + y + 'px) translate(-50%,-50%)';
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.elapsedTime;

  idleTimer += dt;
  if (!dragging && !reduceMotion) targetTheta += dt * 0.035;

  camDist += (targetDist - camDist) * Math.min(1, dt * 3);
  camTheta += (targetTheta - camTheta) * Math.min(1, dt * 5);
  camPhi += (targetPhi - camPhi) * Math.min(1, dt * 5);

  camera.position.set(
    camDist * Math.sin(camPhi) * Math.sin(camTheta),
    camDist * Math.cos(camPhi),
    camDist * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(0, 0, 0);

  planet.rotation.y = time * 0.03;
  atmosphere.rotation.y = time * 0.02;
  if (world.userData.ringMat) world.userData.ringMat.uniforms.uT.value = time;

  for (const bp of bgPlanets) {
    bp.group.rotation.y = time * bp.spin;
    bp.mesh.rotation.y = time * bp.spin * 1.6;
  }

  for (const m of moons) {
    m.angle += dt * m.def.speed * (reduceMotion ? 0.3 : 1);
    m.mesh.position.set(Math.cos(m.angle) * m.def.radius, 0, Math.sin(m.angle) * m.def.radius);
    m.mesh.rotation.y = time * 0.4;
    updateMoonLabel(m);
  }

  planetMat.uniforms.uT.value = time;
  scene.userData.starMat.uniforms.uT.value = time;

  if (pulseActive) {
    const el = (performance.now() - pulseStart) / 1200;
    planetMat.uniforms.uPulseT.value = el * (PLANET_R * 2.6);
    if (el > 1) pulseActive = false;
  }

  bloom.strength = 0.65 + Math.sin(time * 0.6) * 0.05;

  composer.render();

  if (firstFrame) {
    firstFrame = false;
    window.__sceneReady = true;
    setTimeout(() => {
      document.getElementById('pct').textContent = '100%';
      document.getElementById('loader').classList.add('done');
    }, reduceMotion ? 400 : 1600);
  }
}
animate();

/* fake-but-honest loader progress */
(() => {
  const pct = document.getElementById('pct');
  let v = 0;
  const iv = setInterval(() => {
    v = Math.min(v + Math.random() * 9, window.__sceneReady ? 100 : 92);
    pct.textContent = Math.floor(v) + '%';
    if (v >= 100) clearInterval(iv);
  }, 110);
})();
</script>
</body>
</html>
