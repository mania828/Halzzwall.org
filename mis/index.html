<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0418">
<meta name="robots" content="noindex, nofollow">
<title>misery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;700&family=Fraunces:ital@1&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#f0eaff;
    --dim:#9d8fc9;
    --cyan:#c9a2ff;
    --violet:#a78bfa;
    --bg:#0a0418;
  }
  *{margin:0;padding:0;box-sizing:border-box;
    user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;
    -webkit-touch-callout:none;
  }
  html,body{height:100%;background:var(--bg)}
  body{
    color:var(--ink);
    font-family:'Sora',sans-serif;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
    background-image:
      radial-gradient(ellipse 60% 45% at 50% 20%, rgba(139,92,246,0.20), transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(124,58,237,0.14), transparent 60%);
  }
  #stars{position:fixed;inset:0;z-index:0}

  .card{
    position:relative;z-index:2;
    width:min(420px,92vw);
    padding:44px 34px 36px;
    border-radius:24px;
    background:linear-gradient(165deg,rgba(20,16,52,.6),rgba(8,5,26,.7));
    border:1px solid rgba(190,150,255,.2);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    box-shadow:0 30px 80px -20px rgba(120,80,220,.35);
    text-align:center;
  }

  .glowOrb{
    width:120px;height:120px;border-radius:50%;margin:0 auto 26px;
    background:radial-gradient(circle at 35% 30%,#c084fc,#7c3aed 45%,#3b1a78 78%,#160a2e 100%);
    box-shadow:0 0 50px 8px rgba(160,110,255,.4);
    position:relative;
  }
  .glowOrb.playing{animation:pulseOrb 2.2s ease-in-out infinite}
  @keyframes pulseOrb{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .glowOrb::after{
    content:'';position:absolute;inset:-10px;border-radius:50%;
    border:1px solid rgba(196,162,255,.3);
  }

  h1{
    font-family:'Fraunces',serif;font-style:italic;font-weight:400;
    font-size:30px;letter-spacing:.02em;
    background:linear-gradient(160deg,#f6f0ff 20%,#cfaaff 60%,#8b5cf6 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .artist{
    margin-top:6px;font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);
  }

  .controls{
    margin-top:34px;display:flex;align-items:center;justify-content:center;gap:22px;
  }
  #playBtn{
    width:64px;height:64px;border-radius:50%;flex:0 0 auto;
    background:linear-gradient(160deg,#c084fc,#7c3aed);
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px -8px rgba(160,110,255,.6);
    transition:transform .2s ease;
  }
  #playBtn:hover{transform:scale(1.06)}
  #playBtn svg{width:24px;height:24px;fill:#0a0418;margin-left:2px}
  #playBtn.playing svg{margin-left:0}

  .progWrap{flex:1;display:flex;flex-direction:column;gap:8px}
  #bar{
    position:relative;height:6px;border-radius:100px;background:rgba(190,150,255,.15);
    cursor:pointer;overflow:hidden;
  }
  #barFill{
    position:absolute;top:0;left:0;height:100%;width:0%;
    background:linear-gradient(90deg,#8b5cf6,#c084fc);
    border-radius:100px;
  }
  .times{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);letter-spacing:.05em}

  .foot{margin-top:28px;font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:rgba(143,128,201,.5)}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="card">
  <div class="glowOrb" id="orb"></div>
  <h1>misery</h1>
  <div class="artist">halzz</div>

  <div class="controls">
    <button id="playBtn" aria-label="Play">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="progWrap">
      <div id="bar"><div id="barFill"></div></div>
      <div class="times">
        <span id="curTime">0:00</span>
        <span id="durTime">0:00</span>
      </div>
    </div>
  </div>

  <div class="foot">halzz wall</div>
</div>

<audio id="audio" src="Halzz-misery.mp3" preload="metadata"></audio>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const orb = document.getElementById('orb');
  const bar = document.getElementById('bar');
  const barFill = document.getElementById('barFill');
  const curTime = document.getElementById('curTime');
  const durTime = document.getElementById('durTime');

  function fmt(s){
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }

  audio.addEventListener('loadedmetadata', () => {
    durTime.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    curTime.textContent = fmt(audio.currentTime);
    const pct = (audio.currentTime / audio.duration) * 100 || 0;
    barFill.style.width = pct + '%';
  });

  audio.addEventListener('ended', () => {
    playBtn.classList.remove('playing');
    orb.classList.remove('playing');
    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  });

  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      playBtn.classList.add('playing');
      orb.classList.add('playing');
      playIcon.innerHTML = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
    } else {
      audio.pause();
      playBtn.classList.remove('playing');
      orb.classList.remove('playing');
      playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    }
  });

  bar.addEventListener('click', (e) => {
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (isFinite(audio.duration)) audio.currentTime = pct * audio.duration;
  });

  /* lightweight starfield background */
  (function(){
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    const stars = Array.from({length: 140}, () => ({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: Math.random() * 1.4 + 0.3,
      p: Math.random() * Math.PI * 2,
      s: 0.5 + Math.random() * 1.2
    }));
    function frame(t){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars){
        const a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * 0.001 * s.s + s.p));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(210, 196, 255,' + a + ')';
        ctx.fill();
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();
</script>

</body>
</html>
